<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" role="img" aria-label="TryVit — white horizontal lockup">
  <title>TryVit — White Lockup</title>
  <desc>Full horizontal brand lockup, all white (#FFFFFF). Use on dark or photographic backgrounds where the standard two-tone lockup lacks contrast.</desc>
  <!-- Icon area: 48×48 (scaled from 64×64 ×0.75) — white -->
  <g transform="translate(0,0) scale(0.75)">
    <path
      d="M 32 3.5
         C 45.5 8,   55.5 21, 55.5 34
         C 55.5 47,  42   57, 32   61
         C 22   57,  8.5  47, 8.5  34
         C 8.5  21,  18.5 8,  32   3.5
         Z"
      fill="#FFFFFF"
    />
  </g>
  <!-- Wordmark — all white -->
  <text
    x="58" y="33"
    font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="-0.03em"
    fill="#FFFFFF"
    dominant-baseline="auto"
  >TryVit</text>
</svg>
