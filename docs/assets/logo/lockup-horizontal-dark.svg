<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" role="img" aria-label="TryVit">
  <title>TryVit — Horizontal Lockup (Dark Mode)</title>
  <desc>Dark-mode horizontal brand lockup for vitDark (#0A2E1A) backgrounds. Logomark uses vitAccent-to-vitGreen gradient; wordmark is vitLight.</desc>

  <defs>
    <linearGradient id="brand-fill-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#1DB954"/>
    </linearGradient>
  </defs>

  <!-- ═══ Logomark (dark mode variant, 100×100) ═══ -->
  <svg x="10" y="10" width="100" height="100" viewBox="0 0 512 512">
    <path d="M 256 28 C 364 64, 444 168, 444 272 C 444 376, 336 456, 256 488 C 176 456, 68 376, 68 272 C 68 168, 148 64, 256 28 Z" fill="url(#brand-fill-dark)"/>
    <!-- Veins — dark strokes for contrast on light fills -->
    <line x1="256" y1="84" x2="256" y2="440" stroke="#0A2E1A" stroke-width="3.5" opacity="0.25" stroke-linecap="round"/>
    <line x1="256" y1="176" x2="172" y2="236" stroke="#0A2E1A" stroke-width="2.5" opacity="0.18" stroke-linecap="round"/>
    <line x1="256" y1="176" x2="340" y2="236" stroke="#0A2E1A" stroke-width="2.5" opacity="0.18" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="180" y2="312" stroke="#0A2E1A" stroke-width="2.5" opacity="0.18" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="332" y2="312" stroke="#0A2E1A" stroke-width="2.5" opacity="0.18" stroke-linecap="round"/>
    <line x1="256" y1="336" x2="200" y2="380" stroke="#0A2E1A" stroke-width="2.5" opacity="0.18" stroke-linecap="round"/>
    <line x1="256" y1="336" x2="312" y2="380" stroke="#0A2E1A" stroke-width="2.5" opacity="0.18" stroke-linecap="round"/>
    <!-- Accent dot -->
    <circle cx="256" cy="64" r="10" fill="#F0FAF4" opacity="0.90"/>
  </svg>

  <!-- ═══ Wordmark (vitLight for vitDark backgrounds) ═══ -->
  <text
    x="160" y="72"
    font-family="'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="40"
    font-weight="700"
    fill="#F0FAF4"
    letter-spacing="0.02em"
    dominant-baseline="middle"
  >TryVit</text>
</svg>
