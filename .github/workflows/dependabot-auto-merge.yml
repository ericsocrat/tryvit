# Auto-merge Dependabot PRs for patch and minor updates
# Major version bumps still require manual review.
#
# Requires: "Allow auto-merge" enabled in repo settings (already done).
# The PR still must pass all required status checks before merging.

name: Dependabot Auto-Merge

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependabot-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    name: "Auto-Merge Safe Updates"
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge patch and minor updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major updates for manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          # Ensure labels exist (idempotent — ignores "already exists" errors)
          gh label create "major-update" --color "D93F0B" --description "Major version bump requiring manual review" 2>/dev/null || true
          gh label create "needs-review" --color "FBCA04" --description "Requires human review before merge" 2>/dev/null || true
          gh pr edit "$PR_URL" --add-label "major-update,needs-review"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
