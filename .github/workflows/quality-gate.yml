# ═══════════════════════════════════════════════════════════════════════════════
# Quality Gate — Automated Mobile + Desktop Audit
# ═══════════════════════════════════════════════════════════════════════════════
#
# Runs the quality-gate audit runners on every PR (smoke mode) and nightly
# (full mode). Uploads screenshots, Playwright HTML report, and produces
# a GitHub Step Summary.
#
# Smoke (PR):   ~9 routes × 2 viewports  → < 5 min
# Full (nightly / manual):  ~40 routes × 2 viewports  → ~18 min
#
# @see https://github.com/ericsocrat/tryvit/issues/178
# ═══════════════════════════════════════════════════════════════════════════════

name: Quality Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/quality-gate.yml"
  schedule:
    - cron: "0 4 * * *" # Nightly at 04:00 UTC (staggered from nightly 02:00 + api-contract 03:30)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_QA_MODE: "1"
  # Fixture IDs are seeded dynamically by the "Seed QA fixture data" step.
  # Override via QA_PRODUCT_ID, QA_CATEGORY_SLUG secrets if needed.

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── Node.js ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ── Playwright browsers (cached) ─────────────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build application
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_STAGING || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # ── Start application ──────────────────────────────────────────────────────
      - name: Start application
        working-directory: frontend
        run: npm run start &
        env:
          PORT: 3000
          # Server-side code (middleware, server components) needs these at
          # runtime; NEXT_PUBLIC_* are baked into the client bundle at build
          # time but process.env reads in Node.js require the actual values.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_STAGING || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Wait for app ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      # ── Seed QA fixture data ──────────────────────────────────────────────
      - name: Seed QA fixture data
        id: seed
        working-directory: frontend
        run: |
          # Seed deterministic test products; capture IDs into $GITHUB_ENV
          OUTPUT=$(node tests/quality/seed-fixtures.mjs 2>&1 1>/tmp/qa-ids.txt || true)
          echo "$OUTPUT"
          if [ -f /tmp/qa-ids.txt ] && [ -s /tmp/qa-ids.txt ]; then
            cat /tmp/qa-ids.txt >> "$GITHUB_ENV"
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "seeded=false" >> "$GITHUB_OUTPUT"
            echo "::warning::QA fixture seeding skipped or failed — tests may use fallback IDs"
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_STAGING || secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Determine mode ───────────────────────────────────────────────────
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "mode=smoke" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi
          echo "Quality gate mode: $(cat "$GITHUB_OUTPUT" | grep mode | cut -d= -f2)"

      # ── Check auth credentials ──────────────────────────────────────────
      - name: Check auth credentials
        id: auth
        run: |
          if [ -n "$QA_TEST_EMAIL" ] && [ -n "$QA_TEST_PASSWORD" ]; then
            echo "has_auth=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_auth=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Missing QA_TEST_EMAIL and/or QA_TEST_PASSWORD — Lighthouse audits will be skipped"
          fi
        env:
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_PASSWORD: ${{ secrets.QA_TEST_PASSWORD }}

      # ── Mobile Audit ─────────────────────────────────────────────────────
      - name: Run Mobile Audit
        working-directory: frontend
        run: npx playwright test --project=quality-mobile --reporter=html,list
        env:
          QA_MODE_LEVEL: ${{ steps.mode.outputs.mode }}
          BASE_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}

      # ── Desktop Audit ────────────────────────────────────────────────────
      - name: Run Desktop Audit
        if: always()
        working-directory: frontend
        run: npx playwright test --project=quality-desktop --reporter=html,list
        env:
          QA_MODE_LEVEL: ${{ steps.mode.outputs.mode }}
          BASE_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}

      # ── Lighthouse CI (Mobile) ─────────────────────────────────────────
      - name: Run Lighthouse CI (Mobile)
        working-directory: frontend
        if: always() && steps.auth.outputs.has_auth == 'true'
        run: npx lhci autorun --config=lighthouserc.mobile.js
        env:
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_PASSWORD: ${{ secrets.QA_TEST_PASSWORD }}
          QA_PRODUCT_ID: ${{ secrets.QA_PRODUCT_ID }}

      # ── Lighthouse CI (Desktop) ────────────────────────────────────────
      - name: Run Lighthouse CI (Desktop)
        working-directory: frontend
        if: always() && steps.auth.outputs.has_auth == 'true'
        run: npx lhci autorun --config=lighthouserc.desktop.js
        env:
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_PASSWORD: ${{ secrets.QA_TEST_PASSWORD }}
          QA_PRODUCT_ID: ${{ secrets.QA_PRODUCT_ID }}

      # ── Upload Artifacts ─────────────────────────────────────────────────
      - name: Upload Screenshots
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: qa-screenshots-${{ steps.mode.outputs.mode }}
          path: frontend/qa_screenshots/latest/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-quality-report
          path: frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Lighthouse Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: lighthouse-reports-${{ steps.mode.outputs.mode }}
          path: frontend/lighthouse-reports/
          retention-days: 14
          if-no-files-found: ignore

      # ── Step Summary ─────────────────────────────────────────────────────
      - name: Quality Gate Summary
        if: always()
        run: |
          echo "## Quality Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Mode** | \`${{ steps.mode.outputs.mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- Screenshots, Playwright Report, Lighthouse Reports uploaded (14-day retention)" >> "$GITHUB_STEP_SUMMARY"

      # ── Optional: Nightly failure notification ───────────────────────────
      - name: Notify on nightly failure
        if: failure() && github.event_name == 'schedule'
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          if [ -n "$ALERT_WEBHOOK_URL" ]; then
            curl -sS -X POST "$ALERT_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\": \"Quality Gate nightly FAILED — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              || true
          fi
